name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - "capacitor.config.ts"
      - ".github/workflows/android.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps & sync Capacitor
        run: |
          npm ci
          npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk si-diswa.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: si-diswa-apk
          path: si-diswa.apk

      - name: Publish to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Si Diswa APK (terbaru)
          body: |
            Aplikasi Si Diswa untuk siswa/orang tua.
            Unduh `si-diswa.apk`, lalu pasang di HP Android (izinkan "Instal dari sumber tidak dikenal").
          files: si-diswa.apk
          make_latest: true
